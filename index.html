<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Макс Мессенджер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <div class="header">
            <div class="header-info">
                <div class="avatar">М</div>
                <div class="header-text">
                    <h1>Макс Мессенджер</h1>
                    <span class="status">встроен в Telegram</span>
                </div>
            </div>
            <div class="header-actions">
                <button id="search-btn">🔍</button>
                <button id="menu-btn">⋮</button>
            </div>
        </div>

        <!-- Chat List -->
        <div id="chat-list" class="screen active">
            <div class="chat-item" onclick="openChat('saved')">
                <div class="avatar">💾</div>
                <div class="chat-info">
                    <h3>Избранное</h3>
                    <p>Вы: зачем мне телеграм, если есть макс?</p>
                </div>
                <span class="time">14:30</span>
            </div>
            <div class="chat-item" onclick="openChat('durov')">
                <div class="avatar" style="background: #2481cc;">П</div>
                <div class="chat-info">
                    <h3>Павел Дуров</h3>
                    <p>это нарушение ToS...</p>
                    <span class="badge">1</span>
                </div>
                <span class="time">14:25</span>
            </div>
        </div>

        <!-- Chat Screen -->
        <div id="chat-screen" class="screen">
            <div class="chat-header">
                <button onclick="backToList()">←</button>
                <div class="chat-header-info">
                    <div class="avatar" id="current-avatar">М</div>
                    <div>
                        <h3 id="current-chat-name">Чат</h3>
                        <span class="status">онлайн</span>
                    </div>
                </div>
            </div>
            
            <div id="messages" class="messages"></div>
            
            <div class="input-area">
                <button id="attach-btn">📎</button>
                <button id="voice-btn" onmousedown="startVoice()" onmouseup="stopVoice()">🎤</button>
                <input type="text" id="message-input" placeholder="Сообщение..." maxlength="4096">
                <button onclick="sendMessage()" id="send-btn">➤</button>
            </div>
        </div>

        <!-- Self-destruct timer -->
        <div id="timer-modal" class="modal hidden">
            <h3>⏱️ Самоуничтожение</h3>
            <div class="timer-options">
                <button onclick="setTimer(5)">5 сек</button>
                <button onclick="setTimer(60)">1 мин</button>
                <button onclick="setTimer(3600)">1 час</button>
                <button onclick="setTimer(86400)">24 часа</button>
            </div>
        </div>
    </div>

    <script src="crypto.js"></script>
    <script src="voice.js"></script>
    <script src="app.js"></script>
</body>
</html>
